<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
  <meta name="theme-color" content="#4A2C2A">
  <meta name="description" content="Nuansa Kopi - Coffee Lab & Shop: R&D, Cost Analysis, Penjualan">
  <title>Nuansa Kopi</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="assets/icons/logo.png">
  <link rel="apple-touch-icon" href="assets/icons/icon-192.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app">
    <header class="app-header">
      <img class="header-icon" id="header-logo" src="assets/icons/logo.png" alt="Nuansa Kopi" style="object-fit:contain">
      <div class="header-text" style="flex:1">
        <h1>Nuansa Kopi</h1>
      </div>
      <button class="header-settings-btn" id="settings-btn" onclick="openSettings()" title="Settings">⚙️</button>
    </header>

    <main id="app-content"></main>

    <nav class="bottom-nav" id="bottom-nav">
      <a href="#/dashboard" data-page="dashboard">
        <span class="nav-icon">📈</span>
        <span class="nav-label">Dashboard</span>
      </a>
      <a href="#/sales" data-page="sales">
        <span class="nav-icon">💰</span>
        <span class="nav-label">Penjualan</span>
      </a>
      <a href="#/rnd" data-page="rnd">
        <span class="nav-icon">🧪</span>
        <span class="nav-label">R&amp;D</span>
      </a>
      <a href="#/cost" data-page="cost">
        <span class="nav-icon">📊</span>
        <span class="nav-label">Biaya</span>
      </a>
    </nav>
  </div>

  <div id="toast" class="toast"></div>

  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/db.js"></script>
  <script src="js/helpers/utils.js"></script>
  <script src="js/pages/login.js"></script>
  <script src="js/pages/settings.js"></script>
  <script src="js/pages/dashboard.js"></script>
  <script src="js/pages/rnd.js"></script>
  <script src="js/pages/costAnalysis.js"></script>
  <script src="js/pages/sales.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
